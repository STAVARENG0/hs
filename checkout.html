<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | HS Nutrition</title>
<link rel="icon" href="data:,">
<link rel="shortcut icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root { --orange:#ff3c00; --white:#ffffff; --bg:#f5f6fa; --text:#222; }
*{ box-sizing:border-box; margin:0; padding:0; font-family:'Poppins',sans-serif; }
body{ background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
.checkout-card{ background:var(--white); border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.12); max-width:660px; width:100%; padding:32px 26px; text-align:center; }
.logo{ width:180px; border-radius:16px; border:2px solid var(--orange); box-shadow:0 0 12px rgba(255,60,0,.35); margin-bottom:18px; }
h1{ color:var(--orange); font-size:22px; margin-bottom:14px; }
.summary{ margin:18px 0; }
.row{ display:flex; justify-content:space-between; align-items:center; margin:8px 0; font-size:14px; }
.row.total{ font-size:20px; font-weight:800; color:var(--orange); margin-top:16px; }
.items{ text-align:left; margin:10px 0 6px; }
.item{ display:flex; justify-content:space-between; gap:12px; margin:6px 0; }
.item-title{ font-size:14px; }
.item-sub{ font-weight:600; color:var(--orange); }
.shipping-box{ text-align:left; background:#ffffff; border:2px solid var(--orange); border-radius:16px; padding:16px; margin:16px 0; box-shadow:0 8px 22px rgba(255,60,0,.14); }
.shipping-box h3{ color:var(--orange); font-size:16px; margin-bottom:10px; font-weight:800; }
.shipping-option{ display:flex; align-items:center; gap:10px; padding:12px 10px; border-radius:12px; cursor:pointer; background:#fff7f3; border:1px solid rgba(255,60,0,.25); margin-top:8px; font-weight:600; }
.shipping-option:hover{ background:#ffe4d8; border-color:var(--orange); }
.shipping-option input{ transform:scale(1.15); }
#paypal-section{ margin-top:16px; }
#paypal-button-paypal, #paypal-button-card{ margin-bottom:12px; }
.helper{ margin-top:12px; font-size:13px; color:#666; }
footer{ margin-top:16px; color:#666; font-size:13px; }
.hidden{ display:none !important; }

.policy-btn{
  display:inline-block;
  margin:4px 0 18px;
  background:linear-gradient(90deg,var(--orange),#ff9b6a);
  color:#101010;
  padding:9px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  text-decoration:none;
  box-shadow:0 8px 20px rgba(255,60,0,.22);
  text-transform:uppercase;
  letter-spacing:.06em;
}
.policy-btn:hover{ filter:brightness(1.06); transform:translateY(-1px); }
</style>
</head>
<body>

<div class="checkout-card">
  <img src="5.png" alt="HS Nutrition" class="logo">
  <h1>Your Cart</h1>

  <a class="policy-btn" href="return-refund-policy.html" aria-label="Return and Refund Policy">
    Return & Refund Policy
  </a>

  <div class="items" id="cartList"></div>


  <div class="shipping-box" id="shippingBox">
    <h3>Choose shipping</h3>
    <label class="shipping-option"><input type="radio" name="checkoutShipping" value="7"> 7€ — No tracked</label>
    <label class="shipping-option"><input type="radio" name="checkoutShipping" value="10"> 10€ — Tracked</label>
  </div>

  <div class="summary">
    <div class="row"><span class="label">Products Subtotal</span><span class="value" id="subtotalValue">€ 0.00</span></div>
    <div class="row"><span class="label" id="shippingLabel">Shipping</span><span class="value" id="shippingValue">€ 0.00</span></div>
    <div class="row total">Total: € <span id="totalAmount">0.00</span></div>
  </div>

  <div id="paypal-section">
    <div id="paypal-button-paypal"></div>
    <div id="paypal-button-card"></div>
    <div id="helperMsg" class="helper hidden">Add products to your cart to enable payment.</div>
  </div>

  <footer>© <span id="year"></span> HS Nutrition</footer>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=AWxRBWcw1-yyUd5Ozct3UrhsF0ztYRedV2T8qx9gSTCChSreNBl5MoCo-rXPE9tZCpp0Rf6QenfdnfWS&currency=EUR&intent=capture&commit=true&locale=en_IE&components=buttons,funding-eligibility&enable-funding=card"></script>
<script>
const CART_KEY='hs_cart';
const SHIP_KEY='hs_shipping';
const API_BASE='https://hs-nutrition-production.up.railway.app';
document.getElementById('year').textContent = new Date().getFullYear();
function fmtEUR(n){ return '€ ' + Number(n).toFixed(2); }

function getShipping(){
  const selected = document.querySelector('input[name="checkoutShipping"]:checked');
  if(!selected){ return { amount: 0, label: 'Choose shipping', selected: false }; }
  const amount = Number(selected.value);
  if(amount === 10){ return { amount: 10, label: 'Tracked (€10)', selected: true }; }
  if(amount === 7){ return { amount: 7, label: 'No tracked (€7)', selected: true }; }
  return { amount: 0, label: 'Choose shipping', selected: false };
}

let cart=[]; try{ cart = JSON.parse(localStorage.getItem(CART_KEY) || '[]'); }catch(e){ cart=[]; }
cart = Array.isArray(cart) ? cart : [];
let serverProducts = [];
let checkoutReady = false;

async function loadServerProducts(){
  const r = await fetch(API_BASE + '/api/public/products?t=' + Date.now(), { cache:'no-store' });
  const json = await r.json().catch(()=>({}));
  if(!r.ok || json.ok === false) throw new Error(json.error || ('HTTP ' + r.status));
  serverProducts = Array.isArray(json.data) ? json.data : [];
}

function findServerProduct(id){
  return serverProducts.find(p => String(p.id) === String(id));
}

function renderSummary(){
  const list = document.getElementById('cartList');
  let subtotal = 0;
  const validRows = [];
  if(!cart.length){
    list.innerHTML = '<p style="color:#666;text-align:center;">Your cart is empty.</p>';
  }else{
    list.innerHTML = cart.map(item=>{
      const qty = Math.max(1, parseInt(item.qty || item.quantity || 1, 10) || 1);
      const product = findServerProduct(item.id);
      if(!product){
        return `<div class="item"><div class="item-title">${qty}× Product unavailable</div><div class="item-sub">Removed</div></div>`;
      }
      const price = Number(product.price)||0; // preço lido do backend/products.json
      const sub = qty*price; subtotal += sub;
      validRows.push({ id:String(product.id), qty, title:product.title, price, lineTotal: sub });
      return `<div class="item">
                <div class="item-title">${qty}× ${product.title}<br><small>${qty} × ${fmtEUR(price)} each</small></div>
                <div class="item-sub">${fmtEUR(sub)}</div>
              </div>`;
    }).join('');
  }
  const ship = getShipping();
  document.getElementById('subtotalValue').textContent = fmtEUR(subtotal);
  document.getElementById('shippingLabel').textContent = ship.selected ? ship.label : 'Shipping';
  document.getElementById('shippingValue').textContent = ship.selected ? fmtEUR(ship.amount) : 'Choose shipping';

  let effectiveTotal = 0;
  const buttons = document.getElementById('paypal-section');
  const helper = document.getElementById('helperMsg');
  if(subtotal > 0 && validRows.length > 0){
    effectiveTotal = subtotal + (ship.selected ? Number(ship.amount||0) : 0);
    buttons.classList.remove('hidden');
    helper.classList.add('hidden');
  }else{
    effectiveTotal = 0;
    buttons.classList.remove('hidden');
    document.getElementById('paypal-button-paypal').classList.add('hidden');
    document.getElementById('paypal-button-card').classList.add('hidden');
    helper.classList.remove('hidden');
  }
  document.getElementById('totalAmount').textContent = Number(effectiveTotal).toFixed(2);
  return { subtotal, shipping: Number(ship.amount||0), shippingSelected: !!ship.selected, total: Number(effectiveTotal.toFixed(2)), validRows };
}

function getShippingText(amount){
  if(Number(amount) === 10) return 'Tracked shipping (€10)';
  if(Number(amount) === 7) return 'No tracked shipping (€7)';
  return 'Free shipping (€0)';
}

function buildSellerSummary(state){
  const lines = state.validRows.map(function(item){
    return `${item.qty}x ${item.title} - ${fmtEUR(item.price)} each = ${fmtEUR(item.lineTotal || (item.qty * item.price))}`;
  });
  lines.push(`Shipping: ${getShippingText(state.shipping)} - ${fmtEUR(state.shipping)}`);
  lines.push(`Total: ${fmtEUR(state.total)}`);
  return lines.join(' | ');
}

function getBuyerInfo(details){
  const payer = details && details.payer ? details.payer : {};
  const name = payer.name ? [payer.name.given_name, payer.name.surname].filter(Boolean).join(' ') : 'customer';
  const email = payer.email_address || 'Customer email not returned by PayPal';
  return { name, email };
}

function commonConfig(){
  return {
    onClick: function(data, actions){
      const { subtotal, shippingSelected } = renderSummary();
      if(subtotal <= 0){
        alert('Please add products before paying.');
        return actions.reject();
      }
      if(!shippingSelected){
        alert('Please choose shipping before paying.');
        return actions.reject();
      }
      return actions.resolve();
    },
    createOrder: function(data, actions){
      const state = renderSummary();
      const { subtotal, shippingSelected, shipping, total, validRows } = state;
      if(subtotal <= 0){ throw new Error('Empty subtotal'); }
      if(!shippingSelected){ throw new Error('Choose shipping'); }

      const paypalItems = validRows.map(function(item){
        return {
          name: String(item.title || 'HS Nutrition Product').substring(0, 127),
          quantity: String(item.qty || 1),
          unit_amount: {
            currency_code: 'EUR',
            value: Number(item.price || 0).toFixed(2)
          }
        };
      });

      const paypalSubtotal = Number(subtotal || 0).toFixed(2);
      const paypalShipping = Number(shipping || 0).toFixed(2);
      const paypalTotal = Number(total || 0).toFixed(2);

      return actions.order.create({
        purchase_units:[{
          description:'HS Nutrition Order - product list, quantity, shipping and total included',
          custom_id: buildSellerSummary(state).substring(0, 127),
          invoice_id: ('HS-' + Date.now()).substring(0, 127),
          amount:{
            currency_code:'EUR',
            value: paypalTotal,
            breakdown:{
              item_total:{
                currency_code:'EUR',
                value: paypalSubtotal
              },
              shipping:{
                currency_code:'EUR',
                value: paypalShipping
              }
            }
          },
          items: paypalItems
        }]
      });
    },
    onApprove: function(data, actions){
      return actions.order.capture().then(function(details){
        const buyer = getBuyerInfo(details);
        console.log('PayPal buyer email for tracking:', buyer.email);
        alert('✅ Payment completed by ' + buyer.name + '! Customer email: ' + buyer.email);
        localStorage.removeItem(CART_KEY);
        document.getElementById('cartList').innerHTML = '<p style="color:green;text-align:center;">Payment Approved!</p><p style="color:#222;text-align:center;font-size:13px;"><b>Customer email:</b> ' + buyer.email + '</p>';
        document.getElementById('subtotalValue').textContent = fmtEUR(0);
        document.getElementById('shippingValue').textContent = fmtEUR(0);
        document.getElementById('totalAmount').textContent = '0.00';
        document.getElementById('paypal-section').classList.add('hidden');
      });
    },
    onError: function(err){ console.error('PayPal error:', err); alert('❌ There was an issue with PayPal Checkout. Please try again.'); }
  };
}

async function bootCheckout(){
  try{
    await loadServerProducts();
    document.querySelectorAll('input[name="checkoutShipping"]').forEach(r => r.addEventListener('change', renderSummary));
    const state = renderSummary();
    if(typeof paypal !== 'undefined' && state.subtotal > 0){
      const btnPayPal = paypal.Buttons(Object.assign({}, commonConfig(), {
        fundingSource: paypal.FUNDING.PAYPAL,
        style:{ layout:'vertical', color:'gold', shape:'pill', label:'paypal', height:45 }
      }));
      if(btnPayPal.isEligible()) btnPayPal.render('#paypal-button-paypal');

      const btnCard = paypal.Buttons(Object.assign({}, commonConfig(), {
        fundingSource: paypal.FUNDING.CARD,
        style:{ layout:'vertical', color:'black', shape:'pill', label:'pay', height:45 }
      }));
      if(btnCard.isEligible()) btnCard.render('#paypal-button-card');
    }
  }catch(e){
    console.error(e);
    document.getElementById('cartList').innerHTML = '<p style="color:#c0392b;text-align:center;">Could not load products from backend.</p>';
  }
}
bootCheckout();
</script>

</body>
</html>
